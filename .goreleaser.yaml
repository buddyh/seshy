# GoReleaser config — https://goreleaser.com
# Release flow: `git tag vX.Y.Z && git push origin vX.Y.Z` triggers
# .github/workflows/release.yml, which builds cross-platform binaries, cuts a
# GitHub release, and updates the Homebrew formula in buddyh/homebrew-tap.
version: 2
project_name: seshy

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0  # pure-Go sqlite (modernc) — no cgo, clean cross-compile
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}
    main: .
    binary: seshy

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

homebrew_casks:
  - name: seshy
    repository:
      owner: buddyh
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://seshy.dev"
    description: "Find and resume any past AI coding-agent session, in any directory."
    commit_author:
      name: buddyh
      email: buddy.hadry@gmail.com
    # Strip the Gatekeeper quarantine bit so the binary runs on first launch.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/seshy"]
          end

release:
  github:
    owner: buddyh
    name: seshy
